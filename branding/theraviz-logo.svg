<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TheraViz logo</title>
  <desc id="desc">Minimal professional logo for TheraViz by Butacu Enrico</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D111A"/>
      <stop offset="100%" stop-color="#141B28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90BFFF"/>
      <stop offset="100%" stop-color="#5A8CE2"/>
    </linearGradient>
    <linearGradient id="accentSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CADCFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8CB5F4" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="1560" height="480" rx="34" fill="url(#bg)"/>
  <rect x="20.8" y="20.8" width="1558.4" height="478.4" rx="33.2" stroke="#D9E7FF" stroke-opacity="0.17" stroke-width="1.6"/>

  <!-- mark -->
  <g transform="translate(84 88)">
    <rect x="0" y="0" width="344" height="344" rx="30" fill="#0E1522"/>
    <rect x="1" y="1" width="342" height="342" rx="29" stroke="#D6E5FF" stroke-opacity="0.24"/>

    <path d="M42 172H302" stroke="#C6D9FF" stroke-opacity="0.24" stroke-width="1"/>
    <path d="M42 108H302" stroke="#C6D9FF" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M42 236H302" stroke="#C6D9FF" stroke-opacity="0.1" stroke-width="1"/>

    <!-- waveform -->
    <path d="M46 173 C64 173 62 132 84 132 C106 132 108 216 130 216 C152 216 154 108 176 108 C198 108 198 245 222 245 C245 245 246 146 268 146 C286 146 289 172 302 172"
      stroke="url(#accentSoft)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- lightning stroke -->
    <path d="M170 82 L136 180 H180 L148 262" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(486 182)">
    <text x="0" y="0" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="132" font-weight="700" letter-spacing="0.5">TheraViz</text>
    <text x="4" y="58" fill="#C9D9F4" fill-opacity="0.78" font-family="IBM Plex Mono, Consolas, Menlo, monospace" font-size="34" font-weight="400" letter-spacing="0.6">by Butacu Enrico</text>

    <path d="M4 96H980" stroke="#CFE0FF" stroke-opacity="0.18"/>
    <text x="4" y="146" fill="#BBD1F5" fill-opacity="0.8" font-family="IBM Plex Mono, Consolas, Menlo, monospace" font-size="24" letter-spacing="0.24">PROFESSIONAL AUDIO REACTIVE VISUAL STUDIO</text>
  </g>
</svg>
